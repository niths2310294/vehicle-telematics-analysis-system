<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Behavior Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ✅ YOUR ORIGINAL UI — UNCHANGED */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'DM Sans',sans-serif;
background:#f4f6f9;
color:#1a202c;
min-height:100vh;
}

header{
background:#fff;
border-bottom:1px solid #e8ecf0;
padding:0 28px;
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-title{
font-size:17px;
font-weight:600;
}

.live-pill{
display:flex;
align-items:center;
gap:6px;
padding:4px 12px;
background:#f0fdf4;
border:1px solid #bbf7d0;
border-radius:100px;
font-size:12px;
color:#16a34a;
}

.live-dot{
width:6px;
height:6px;
background:#16a34a;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.main{
padding:24px;
display:flex;
flex-direction:column;
gap:18px;
}

.status-card{
background:#fff;
border-radius:14px;
border:1px solid #e8ecf0;
padding:18px;
display:flex;
align-items:center;
gap:14px;
}

.status-icon{
font-size:22px;
}

.status-label{
font-size:11px;
color:#94a3b8;
text-transform:uppercase;
}

.status-value{
font-size:20px;
font-weight:600;
}

.metrics-row{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
}

.metric-card{
background:#fff;
border:1px solid #e8ecf0;
border-radius:12px;
padding:16px;
}

.metric-label{
font-size:11px;
color:#94a3b8;
text-transform:uppercase;
margin-bottom:10px;
}

.metric-value{
font-size:26px;
font-weight:600;
}

.metric-bar{
margin-top:10px;
height:3px;
background:#f1f5f9;
border-radius:3px;
overflow:hidden;
}

.metric-bar-fill{
height:100%;
width:0%;
transition:width 0.5s;
}

.ax .metric-bar-fill{background:#38bdf8;}
.ay .metric-bar-fill{background:#818cf8;}
.az .metric-bar-fill{background:#fb923c;}

.bottom-row{
display:grid;
grid-template-columns:1fr 280px;
gap:16px;
}

.map-card{
background:#fff;
border-radius:12px;
border:1px solid #e8ecf0;
overflow:hidden;
}

.card-header{
padding:12px 16px;
border-bottom:1px solid #f1f5f9;
display:flex;
justify-content:space-between;
}

#map{
height:360px;
}

.log-card{
background:#fff;
border:1px solid #e8ecf0;
border-radius:12px;
display:flex;
flex-direction:column;
}

.event-list{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:5px;
}

.event-item{
padding:7px 9px;
border-radius:7px;
font-size:12px;
background:#f0fdf4;
border-left:3px solid #86efac;
}

</style>
</head>

<body>

<header>
<div class="header-title">🚗 Driver Behavior Monitor</div>
<div class="live-pill"><div class="live-dot"></div> Live</div>
</header>

<div class="main">

<div class="status-card">
<div class="status-icon">✅</div>
<div>
<div class="status-label">Driving Behavior</div>
<div class="status-value" id="statusValue">Normal</div>
</div>
<div id="statusTime" style="margin-left:auto;">--:--</div>
</div>

<div class="metrics-row">

<div class="metric-card ax">
<div class="metric-label">Accel X</div>
<div class="metric-value" id="ax">0</div>
<div class="metric-bar"><div class="metric-bar-fill" id="axBar"></div></div>
</div>

<div class="metric-card ay">
<div class="metric-label">Accel Y</div>
<div class="metric-value" id="ay">0</div>
<div class="metric-bar"><div class="metric-bar-fill" id="ayBar"></div></div>
</div>

<div class="metric-card az">
<div class="metric-label">Accel Z</div>
<div class="metric-value" id="az">0</div>
<div class="metric-bar"><div class="metric-bar-fill" id="azBar"></div></div>
</div>

<div class="metric-card">
<div class="metric-label">Speed</div>
<div class="metric-value" id="speed">0 km/h</div>
</div>

<div class="metric-card">
<div class="metric-label">Last Update</div>
<div class="metric-value" id="time">Waiting…</div>
</div>

</div>

<div class="bottom-row">

<div class="map-card">
<div class="card-header">
<div>📍 Live Location</div>
<div id="coordText">--</div>
</div>
<div id="map"></div>
</div>

<div class="log-card">
<div class="card-header">
<div>📋 Event Log</div>
</div>
<div class="event-list" id="eventList"></div>
</div>

</div>

</div>

<!-- 🔥 ONLY THIS SCRIPT IS UPDATED -->
<script>

var map=L.map('map').setView([13.0827,80.2707],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker=L.marker([13.0827,80.2707]).addTo(map);

var path=[];
var line=L.polyline(path,{color:'#38bdf8'}).addTo(map);

function setBar(id,val){
document.getElementById(id).style.width=Math.min(Math.abs(val)/3*100,100)+"%";
}

function updateData(){

fetch('/data')
.then(r=>r.json())
.then(data=>{

var ax=data.ax||0;
var ay=data.ay||0;
var az=data.az||0;
var speed=data.speed||0;

document.getElementById('ax').textContent=ax.toFixed(2);
document.getElementById('ay').textContent=ay.toFixed(2);
document.getElementById('az').textContent=az.toFixed(2);

document.getElementById('speed').textContent=speed.toFixed(1)+" km/h";
document.getElementById('time').textContent=data.time;
document.getElementById('statusValue').textContent=data.behavior;

setBar('axBar',ax);
setBar('ayBar',ay);
setBar('azBar',az);

// MAP
if(data.lat && data.lon){
marker.setLatLng([data.lat,data.lon]);
path.push([data.lat,data.lon]);
line.setLatLngs(path);

document.getElementById('coordText').textContent=
data.lat.toFixed(4)+" , "+data.lon.toFixed(4);
}

// 🔥 EVENT LOG UPDATE

var list = document.getElementById("eventList");

// CLEAR
list.innerHTML = "";

// TRIP START
if (data.trip_start) {
    list.innerHTML += `
    <div class="event-item">
        🟢 Trip Started
        <span class="event-time">${data.trip_start}</span>
    </div>`;
}

// TRIP END
if (data.trip_end) {
    list.innerHTML += `
    <div class="event-item">
        🔴 Trip Ended
        <span class="event-time">${data.trip_end}</span>
    </div>`;

    list.innerHTML += `
    <div class="event-item">
        📏 Distance Travelled
        <span class="event-time">${(data.distance/1000).toFixed(2)} km</span>
    </div>`;
}
});

}

setInterval(updateData,var list=document.getElementById("eventList");2000);
updateData();

</script>

</body>
</html>
